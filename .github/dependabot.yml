version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Toronto"
    groups:
      npm-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7
      semver-major-days: 21
    open-pull-requests-limit: 2
  - package-ecosystem: "uv"
    directories:
      - "/src/data/blog/*"
    schedule:
      interval: "weekly"
    groups:
      uv-dependencies:
        patterns:
          - "*"
        group-by: "dependency-name"
    cooldown:
      default-days: 7
